    <title>Homem-Aranha</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:Arial,sans-serif;min-height:100vh;color:#fff;}
        .container{max-width:1200px;margin:0 auto;padding:20px;}
        body{background:#050505 url("../fotos/thumb.png") center/cover fixed no-repeat;}
        header{padding:30px 0;border-bottom:3px solid #ff3333;margin-bottom:30px;text-align:center;}
        header h1{font-size:48px;color:#ff3333;margin-bottom:10px;}
        header p{color:#cccccc;}
        .menu{display:flex;flex-wrap:wrap;justify-content:center;gap:15px;margin-bottom:40px;padding:20px;background-color:rgba(0,0,0,.6);}
        .menu a{padding:16px 28px;background-color:#ff3333;color:#fff;text-decoration:none;font-size:18px;border-radius:8px;display:inline-block;min-width:140px;text-align:center;}
        .menu a:hover{background-color:#cc0000;}
        .secoes{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
        .secao{background-color:rgba(0,0,0,.55);overflow:hidden;border:1px solid rgba(255,255,255,.08);}
        .secao a{text-decoration:none;color:#fff;display:block;}
        .secao img{width:100%;height:200px;object-fit:cover;display:block;}
        .secao h2{padding:15px;font-size:20px;background-color:#333;color:#ff3333;}
        footer{margin-top:30px;text-align:center;padding:20px;color:#999;border-top:1px solid rgba(255,255,255,.1);}
        @media (max-width:768px){header h1{font-size:28px;}.menu{gap:10px}.secao h2{font-size:18px;}}
    </style>
</head>
